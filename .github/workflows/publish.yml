name: Publish to BSR

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: buf lint
        run: buf lint

      - name: buf push
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: buf push --label "${{ github.ref_name }}"
