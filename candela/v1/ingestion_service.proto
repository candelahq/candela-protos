syntax = "proto3";

package candela.v1;

import "buf/validate/validate.proto";
import "candela/types/trace.proto";

option go_package = "github.com/candelahq/candela/gen/go/candela/v1";

// IngestionService handles internal span ingestion from the OTel Collector.
// This is an internal gRPC service, not exposed externally.
service IngestionService {
  // IngestSpans receives a batch of spans for processing and storage.
  rpc IngestSpans(IngestSpansRequest) returns (IngestSpansResponse);
}

message IngestSpansRequest {
  repeated candela.types.Span spans = 1 [(buf.validate.field).repeated.max_items = 10000];
}

message IngestSpansResponse {
  int32 accepted_count = 1;
  int32 rejected_count = 2;
  repeated string errors = 3;
}
