syntax = "proto3";

package candela.v1;

import "candela/types/common.proto";
import "candela/types/user.proto";

option go_package = "github.com/candelahq/candela/gen/go/candela/v1";

// DashboardService provides aggregated metrics and usage data.
// Exposed via ConnectRPC for the web UI dashboards.
service DashboardService {
  // GetUsageSummary returns aggregated token usage, cost, and request counts.
  rpc GetUsageSummary(GetUsageSummaryRequest) returns (GetUsageSummaryResponse);

  // GetModelBreakdown returns usage broken down by model.
  rpc GetModelBreakdown(GetModelBreakdownRequest) returns (GetModelBreakdownResponse);

  // GetLatencyPercentiles returns latency distribution data.
  rpc GetLatencyPercentiles(GetLatencyPercentilesRequest) returns (GetLatencyPercentilesResponse);

  // GetMyUsage returns the calling user's personal usage summary.
  rpc GetMyUsage(GetMyUsageRequest) returns (GetMyUsageResponse);

  // GetTeamLeaderboard returns per-user usage for the team (admin only).
  rpc GetTeamLeaderboard(GetTeamLeaderboardRequest) returns (GetTeamLeaderboardResponse);
}

message GetUsageSummaryRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
  string environment = 3;
}

message GetUsageSummaryResponse {
  int64 total_traces = 1;
  int64 total_spans = 2;
  int64 total_llm_calls = 3;
  int64 total_input_tokens = 4;
  int64 total_output_tokens = 5;
  double total_cost_usd = 6;
  double avg_latency_ms = 7;
  double error_rate = 8;

  // Time series for charts
  repeated TimeSeriesPoint traces_over_time = 20;
  repeated TimeSeriesPoint cost_over_time = 21;
  repeated TimeSeriesPoint tokens_over_time = 22;
}

message TimeSeriesPoint {
  string timestamp = 1; // ISO 8601 bucket timestamp
  double value = 2;
}

message GetModelBreakdownRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
}

message GetModelBreakdownResponse {
  repeated ModelUsage models = 1;
}

message ModelUsage {
  string model = 1;
  string provider = 2;
  int64 call_count = 3;
  int64 input_tokens = 4;
  int64 output_tokens = 5;
  double cost_usd = 6;
  double avg_latency_ms = 7;
}

message GetLatencyPercentilesRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
  string model = 3; // optional: filter by model
}

message GetLatencyPercentilesResponse {
  double p50_ms = 1;
  double p90_ms = 2;
  double p95_ms = 3;
  double p99_ms = 4;
  repeated TimeSeriesPoint latency_over_time = 10;
}

// ── Per-User Usage ──

message GetMyUsageRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
}

message GetMyUsageResponse {
  int64 total_calls = 1;
  int64 total_input_tokens = 2;
  int64 total_output_tokens = 3;
  double total_cost_usd = 4;
  double avg_latency_ms = 5;
  // Per-model breakdown for this user
  repeated ModelUsage models = 10;
  // Budget context
  candela.types.UserBudget budget = 20;
  double total_remaining_usd = 21;
  // Active grants (grants-first waterfall)
  repeated candela.types.BudgetGrant active_grants = 22;
}

// ── Team Leaderboard ──

message GetTeamLeaderboardRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
  int32 limit = 3; // default: 20
}

message GetTeamLeaderboardResponse {
  repeated UserUsage users = 1;
}

message UserUsage {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
  int64 call_count = 4;
  int64 total_tokens = 5;
  double cost_usd = 6;
  double avg_latency_ms = 7;
  string top_model = 8;
}
