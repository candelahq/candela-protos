syntax = "proto3";

package candela.v1;

import "candela/types/common.proto";
import "candela/types/user.proto";

option go_package = "github.com/candelahq/candela/gen/go/candela/v1";

// DashboardService provides aggregated metrics and usage data.
// Exposed via ConnectRPC for the web UI dashboards.
service DashboardService {
  // GetDashboardData returns a consolidated dashboard view including usage
  // summary, per-model breakdown, and (if authenticated) per-user budget
  // context. Replaces the concurrent fan-out of GetUsageSummary +
  // GetModelBreakdown + GetMyUsage with a single round-trip.
  rpc GetDashboardData(GetDashboardDataRequest) returns (GetDashboardDataResponse);

  // Deprecated: use GetDashboardData instead.
  rpc GetUsageSummary(GetUsageSummaryRequest) returns (GetUsageSummaryResponse) {
    option deprecated = true;
  }

  // Deprecated: use GetDashboardData instead.
  rpc GetModelBreakdown(GetModelBreakdownRequest) returns (GetModelBreakdownResponse) {
    option deprecated = true;
  }

  // GetLatencyPercentiles returns latency distribution data.
  rpc GetLatencyPercentiles(GetLatencyPercentilesRequest) returns (GetLatencyPercentilesResponse);

  // Deprecated: use GetDashboardData with include_budget=true instead.
  // For real-time budget/grant progress, see UserService.GetMyBudget.
  rpc GetMyUsage(GetMyUsageRequest) returns (GetMyUsageResponse) {
    option deprecated = true;
  }

  // GetTeamLeaderboard returns per-user usage for the team (admin only).
  rpc GetTeamLeaderboard(GetTeamLeaderboardRequest) returns (GetTeamLeaderboardResponse);

  // GetJobLeaderboard returns per-job usage for cost attribution.
  rpc GetJobLeaderboard(GetJobLeaderboardRequest) returns (GetJobLeaderboardResponse);
}

message GetUsageSummaryRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
  string environment = 3;
}

message GetUsageSummaryResponse {
  int64 total_traces = 1;
  int64 total_spans = 2;
  int64 total_llm_calls = 3;
  int64 total_input_tokens = 4;
  int64 total_output_tokens = 5;
  double total_cost_usd = 6;
  double avg_latency_ms = 7;
  double error_rate = 8;

  // Cache metrics — these fields are subsets of total_input_tokens.
  // Cache hit rate = cache_read_tokens / input_tokens (excludes output tokens).
  int64 total_cache_read_tokens = 9;
  int64 total_cache_creation_tokens = 10;

  // Time series for charts
  repeated TimeSeriesPoint traces_over_time = 20;
  repeated TimeSeriesPoint cost_over_time = 21;
  repeated TimeSeriesPoint tokens_over_time = 22;
  repeated TimeSeriesPoint cache_read_tokens_over_time = 23;
  repeated TimeSeriesPoint cache_creation_tokens_over_time = 24;
  repeated TimeSeriesPoint input_tokens_over_time = 25;
  repeated TimeSeriesPoint output_tokens_over_time = 26;
}

message TimeSeriesPoint {
  string timestamp = 1; // ISO 8601 bucket timestamp
  double value = 2;
}

message GetModelBreakdownRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
}

message GetModelBreakdownResponse {
  repeated ModelUsage models = 1;
}

message ModelUsage {
  string model = 1;
  string provider = 2;
  int64 call_count = 3;
  int64 input_tokens = 4;
  int64 output_tokens = 5;
  double cost_usd = 6;
  double avg_latency_ms = 7;
  // Cache metrics per model — subset of input_tokens.
  // Cache hit rate = cache_read_tokens / input_tokens.
  int64 cache_read_tokens = 8;
  int64 cache_creation_tokens = 9;
}

message GetLatencyPercentilesRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
  string model = 3; // optional: filter by model
}

message GetLatencyPercentilesResponse {
  double p50_ms = 1;
  double p90_ms = 2;
  double p95_ms = 3;
  double p99_ms = 4;
  repeated TimeSeriesPoint latency_over_time = 10;
}

// ── Per-User Usage ──

message GetMyUsageRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
}

message GetMyUsageResponse {
  int64 total_calls = 1;
  int64 total_input_tokens = 2;
  int64 total_output_tokens = 3;
  double total_cost_usd = 4;
  double avg_latency_ms = 5;
  // Cache metrics — subset of total_input_tokens.
  int64 total_cache_read_tokens = 6;
  int64 total_cache_creation_tokens = 7;
  // Per-model breakdown for this user
  repeated ModelUsage models = 10;
  // Budget context
  candela.types.UserBudget budget = 20;
  double total_remaining_usd = 21;
  // Active grants
  repeated candela.types.BudgetGrant active_grants = 22;
}

// ── Team Leaderboard ──

message GetTeamLeaderboardRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
  int32 limit = 3; // default: 20
}

message GetTeamLeaderboardResponse {
  repeated UserUsage users = 1;
}

message UserUsage {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
  int64 call_count = 4;
  int64 total_tokens = 5;
  double cost_usd = 6;
  double avg_latency_ms = 7;
  string top_model = 8;
}

// ── Job Leaderboard ──

message GetJobLeaderboardRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
  int32 limit = 3; // default: 20
}

message GetJobLeaderboardResponse {
  repeated JobUsage jobs = 1;
}

message JobUsage {
  string job_id = 1;
  int64 call_count = 2;
  int64 total_tokens = 3;
  double cost_usd = 4;
  double avg_latency_ms = 5;
  string top_model = 6;
}

// ── Consolidated Dashboard ──

message GetDashboardDataRequest {
  string project_id = 1;
  candela.types.TimeRange time_range = 2;
  string environment = 3;
  // If true, includes per-user budget and grant context (requires auth).
  // When false or unauthenticated, the budget/grant fields are omitted.
  bool include_budget = 4;
}

message GetDashboardDataResponse {
  // Consolidated usage summary and time series.
  GetUsageSummaryResponse summary = 1;

  // Per-model breakdown.
  repeated ModelUsage models = 2;

  // Per-user budget context (populated when include_budget=true + auth).
  // Absent when budget was not requested or user is unauthenticated.
  message BudgetContext {
    candela.types.UserBudget budget = 1;
    double total_remaining_usd = 2;
    repeated candela.types.BudgetGrant active_grants = 3;
  }
  BudgetContext budget_context = 3;
}
