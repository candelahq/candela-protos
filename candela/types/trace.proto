syntax = "proto3";

package candela.types;

import "candela/types/common.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/candelahq/candela/gen/go/candela/types";

// SpanKind categorizes the type of operation a span represents.
enum SpanKind {
  SPAN_KIND_UNSPECIFIED = 0;
  SPAN_KIND_LLM = 1; // LLM completion/chat call
  SPAN_KIND_AGENT = 2; // Agent lifecycle (ADK, CrewAI, etc.)
  SPAN_KIND_TOOL = 3; // Tool/function invocation
  SPAN_KIND_RETRIEVAL = 4; // Vector DB / RAG retrieval
  SPAN_KIND_EMBEDDING = 5; // Embedding generation
  SPAN_KIND_CHAIN = 6; // LangChain chain execution
  SPAN_KIND_GENERAL = 7; // Traditional span (HTTP, DB, gRPC)
}

// SpanStatus represents the outcome of a span.
enum SpanStatus {
  SPAN_STATUS_UNSPECIFIED = 0;
  SPAN_STATUS_OK = 1;
  SPAN_STATUS_ERROR = 2;
}

// GenAI-specific attributes extracted from OTel semantic conventions.
message GenAIAttributes {
  // Model information
  string model = 1; // gen_ai.request.model
  string provider = 2; // gen_ai.system (openai, google_ai, anthropic, etc.)

  // Token usage
  int64 input_tokens = 10; // gen_ai.usage.input_tokens
  int64 output_tokens = 11; // gen_ai.usage.output_tokens
  int64 total_tokens = 12; // computed

  // Cost (calculated by Candela)
  double cost_usd = 20;

  // Request parameters
  double temperature = 30; // gen_ai.request.temperature
  int64 max_tokens = 31; // gen_ai.request.max_tokens
  double top_p = 32; // gen_ai.request.top_p

  // Content (optional, can be large — may be stored in blob store)
  string input_content = 40; // Prompt / input messages
  string output_content = 41; // Completion / output messages
  string input_content_ref = 42; // Reference to blob store if content is large
  string output_content_ref = 43; // Reference to blob store if content is large
}

// Tool call information for agent/tool spans.
message ToolAttributes {
  string tool_name = 1;
  string tool_input = 2; // JSON-encoded input
  string tool_output = 3; // JSON-encoded output
}

// A single span within a trace.
message Span {
  string span_id = 1;
  string trace_id = 2;
  string parent_span_id = 3;

  string name = 4;
  SpanKind kind = 5;
  SpanStatus status = 6;
  string status_message = 7;

  google.protobuf.Timestamp start_time = 10;
  google.protobuf.Timestamp end_time = 11;
  google.protobuf.Duration duration = 12;

  // GenAI-specific attributes (populated for LLM/agent/tool/retrieval spans)
  GenAIAttributes gen_ai = 20;

  // Tool-specific attributes
  ToolAttributes tool = 21;

  // General attributes from OTel
  repeated Attribute attributes = 30;

  // Metadata
  string project_id = 40;
  string environment = 41;
  string service_name = 42;
  string user_id = 43; // Developer who triggered this span

  // Events (OTel span events)
  repeated SpanEvent events = 50;
}

// An event attached to a span.
message SpanEvent {
  string name = 1;
  google.protobuf.Timestamp timestamp = 2;
  repeated Attribute attributes = 3;
}

// A complete trace consisting of multiple spans.
message Trace {
  string trace_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
  google.protobuf.Duration duration = 4;

  // Aggregated metadata
  string project_id = 5;
  string environment = 6;
  int32 span_count = 7;
  int64 total_tokens = 8;
  double total_cost_usd = 9;
  string root_span_name = 10;
  string user_id = 11; // Developer who owns this trace

  // All spans in the trace
  repeated Span spans = 20;
}

// Summary metrics for a trace (used in list views).
message TraceSummary {
  string trace_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Duration duration = 3;

  string root_span_name = 4;
  string project_id = 5;
  string environment = 6;

  int32 span_count = 10;
  int32 llm_call_count = 11;
  int64 total_tokens = 12;
  double total_cost_usd = 13;

  SpanStatus status = 14;
  string primary_model = 15; // Most-used model in the trace
  string primary_provider = 16;
  string user_id = 17; // Developer who owns this trace
}
