syntax = "proto3";

package candela.types;

import "google/protobuf/timestamp.proto";
import "proto2type/options.proto";

option go_package = "github.com/candelahq/candela/gen/go/candela/types";

// MessageRole identifies who authored a chat message.
enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_USER = 1; // Human user input
  MESSAGE_ROLE_ASSISTANT = 2; // Model response
  MESSAGE_ROLE_SYSTEM = 3; // System prompt / context injection
  MESSAGE_ROLE_TOOL = 4; // Tool output returned to model
}

// Session represents a single conversation between a user and an AI model.
// Each session contains an ordered sequence of messages and tracks aggregate
// usage metrics for cost accounting.
//
// Storage: SQLite (local harness), Firestore (cloud sync)
message Session {
  // Unique session identifier (UUID v4).
  string id = 1 [
    (proto2type.field).document_id = true,
    (proto2type.field).omitempty = OPTIONAL_BOOL_FALSE
  ];
  // User-visible title, auto-generated from first message or set manually.
  string title = 2;
  // Model used for this session (e.g. "gemini-2.5-pro", "claude-sonnet-4").
  string model = 3 [(proto2type.field).omitempty = OPTIONAL_BOOL_FALSE];
  // Total number of messages in this session.
  int32 message_count = 4;
  // Aggregate token usage across all messages.
  int64 total_tokens = 5;
  // Aggregate cost in USD across all messages.
  double total_cost_usd = 6;
  // Device that created this session (for cross-device sync).
  string device_id = 7;
  // When the session was created.
  google.protobuf.Timestamp created_at = 8;
  // When the session was last updated (new message, title change).
  google.protobuf.Timestamp updated_at = 9;
  // Soft-delete timestamp. Non-null means the session is archived.
  optional google.protobuf.Timestamp deleted_at = 10;
}

// Message is a single turn in a chat session.
message Message {
  // Unique message identifier (UUID v4), safe for cross-device sync.
  string id = 1 [
    (proto2type.field).document_id = true,
    (proto2type.field).omitempty = OPTIONAL_BOOL_FALSE
  ];
  // Parent session.
  string session_id = 2 [(proto2type.field).omitempty = OPTIONAL_BOOL_FALSE];
  // Who sent this message.
  MessageRole role = 3 [(proto2type.field).omitempty = OPTIONAL_BOOL_FALSE];
  // Message content (text, markdown, or tool output).
  string content = 4 [(proto2type.field).omitempty = OPTIONAL_BOOL_FALSE];
  // Model that generated this message (only set for assistant messages).
  optional string model = 5;
  // Number of tokens in this message (input or output).
  optional int32 token_count = 6;
  // Cost in USD attributed to this message.
  optional double cost_usd = 7;
  // When this message was created.
  google.protobuf.Timestamp created_at = 8;
  // Monotonic position within the session for display ordering.
  int64 sequence = 9;
}

// SearchResult is a ranked match from full-text search across sessions.
message SearchResult {
  // Session containing the match.
  string session_id = 1;
  // Message containing the match.
  string message_id = 2;
  // Title of the matched session.
  string session_title = 3;
  // Snippet of the matched message content.
  string message_preview = 4;
  // Role of the matched message.
  MessageRole role = 5;
  // Relevance score (higher = better match). Producers must negate
  // the raw FTS5 bm25() value so that consumers can sort descending.
  double score = 6;
  // When the matched message was created.
  google.protobuf.Timestamp created_at = 7;
}
