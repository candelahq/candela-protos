syntax = "proto3";

package candela.types;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "proto2type/options.proto";

option go_package = "github.com/candelahq/candela/gen/go/candela/types";

// ModelCatalogEntry represents a single model in the catalog with its
// pricing, metadata, and visibility state.
message ModelCatalogEntry {
  // Canonical short form: "gemini-2.5-pro", "claude-sonnet-4", "gpt-4o"
  string model_id = 1 [
    (buf.validate.field).string = {
      min_len: 1
      max_len: 128
    },
    (proto2type.field).omitempty = OPTIONAL_BOOL_FALSE
  ];
  // Provider name: "google", "anthropic", "openai", "mistral", etc.
  string provider = 2 [
    (buf.validate.field).string = {
      min_len: 1
      max_len: 64
    },
    (proto2type.field).omitempty = OPTIONAL_BOOL_FALSE
  ];
  // Human-readable display name for UI rendering.
  string display_name = 3 [(buf.validate.field).string = {max_len: 256}];

  // Pricing in USD per 1 million tokens.
  double input_per_million = 4 [
    (buf.validate.field).double = {gte: 0},
    (proto2type.field).omitempty = OPTIONAL_BOOL_FALSE
  ];
  double output_per_million = 5 [
    (buf.validate.field).double = {gte: 0},
    (proto2type.field).omitempty = OPTIONAL_BOOL_FALSE
  ];

  // Admin visibility toggle. Only mutable in database-backed catalog modes.
  bool enabled = 6 [(proto2type.field).omitempty = OPTIONAL_BOOL_FALSE];

  // Model category for grouping in UIs.
  // Examples: "chat", "code", "reasoning", "embedding"
  string category = 7;
  // Maximum context window in tokens. 0 means unknown.
  int64 context_window = 8;

  // Tiered pricing for models that charge higher rates above a token threshold
  // (e.g., Gemini 2.5 Pro charges more above 200K input tokens).
  double input_per_million_high = 9 [(buf.validate.field).double = {gte: 0}];
  double output_per_million_high = 10 [(buf.validate.field).double = {gte: 0}];
  int64 tier_threshold_tokens = 11;

  // Known aliases this entry covers (date-suffixed variants, legacy names).
  // Example: ["claude-sonnet-4-20250514", "claude-3-5-sonnet-v2"]
  repeated string aliases = 12;

  // Reserved for future multi-tenant catalog isolation.
  // Empty means visible to all tenants. Non-empty restricts to listed tenants only.
  repeated string allowed_tenants = 13;

  // Optional model-level discount (0.0-1.0). Applied before global discount.
  // Example: 0.25 = 25% discount for negotiated enterprise pricing.
  double discount_percent = 14 [(buf.validate.field).double = {
    gte: 0
    lte: 1
  }];

  // When this entry was last modified. Set by the server on writes, read-only
  // for clients. Useful for audit trail and debugging pricing changes.
  google.protobuf.Timestamp updated_at = 15 [(proto2type.field).server_timestamp = true];

  // Provider's upstream model identifier when it differs from model_id.
  // For example, Anthropic uses "claude-opus-4.7" as model_id but Vertex AI
  // requires "claude-opus-4-7" (dashes instead of dots).
  // If empty, model_id is used as-is for upstream requests.
  string provider_model_id = 16;

  // Cloud region for this specific model (e.g., "global", "us-east5").
  // Falls back to the deployment-wide CANDELA_VERTEX_REGION setting if empty.
  string region = 17;
}
